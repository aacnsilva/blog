<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Flappy Bird Three.js</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			font-family: Arial, sans-serif;
			text-align: center;
		}

		#ui {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			background: rgba(0, 0, 0, 0.5);
			color: white;
		}

		#gameOver {
			display: none;
			flex-direction: column;
		}

		button {
			margin-top: 10px;
			padding: 10px 20px;
			font-size: 18px;
		}

		#score {
			position: absolute;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 24px;
			font-weight: bold;
			background: rgba(0, 0, 0, 0.6);
			padding: 4px 12px;
			border-radius: 8px;
			color: white;
		}
	</style>
	<script type="module" crossorigin src="/flappyleixo/assets/index-D69YYapU.js"></script>
</head>

<body>
	<div id="score">0</div>

	<div id="ui">
		<div id="menu">
			<h1>Flappy Bird 3D</h1>
			<button id="startBtn">Start Game</button>
		</div>

		<div id="gameOver">
			<h1>Game Over</h1>
			<p id="finalScore"></p>
			<button id="restartBtn">Restart</button>
		</div>
	</div>

</body>

</html>
